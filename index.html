<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Track Builder</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet Routing Machine -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <!-- SortableJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 flex flex-col h-screen">

    <!-- Header -->
    <header class="bg-white shadow-sm w-full z-10">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-3">
                <div class="flex items-center gap-3">
                     <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M12 1.586l-4 4v2.828l-4 4V17a1 1 0 001 1h10a1 1 0 001-1v-2.586l-4-4V5.586l4-4V1.586zM3.707 12.293L6 10V8.414l-4-4V10h3.293L3.707 12.293zM16.293 12.293L14 10V8.414l4-4V10h-3.293L16.293 12.293zM10 16a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                    </svg>
                    <h1 class="text-xl font-bold text-slate-800">GPX Track Builder</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="export-button" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-300 flex items-center gap-2" title="Export the final combined course as a GPX file">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                        Export GPX
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-grow container mx-auto p-4 flex flex-col md:flex-row gap-4">

        <!-- Left Column: Map -->
        <div class="w-full md:w-3/5 lg:w-2/3 h-full flex flex-col">
            <div class="shadow-lg rounded-lg overflow-hidden flex-grow">
                <div id="map" class="w-full h-full"></div>
            </div>
        </div>

        <!-- Right Column: Controls -->
        <div class="w-full md:w-2/5 lg:w-1/3 flex flex-col gap-4">

            <!-- Drawing Tools -->
            <div class="bg-white p-4 rounded-lg shadow-lg">
                <div class="panel-heading flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-slate-700">1. Draw Your Path</h2>
                    <span id="drawing-distance" class="text-sm font-medium text-slate-500">0.00 km</span>
                </div>
                <div class="flex items-center my-3">
                    <label for="follow-roads-toggle" class="mr-3 text-sm font-medium text-slate-600">Snap to Roads:</label>
                    <input type="checkbox" id="follow-roads-toggle" class="h-6 w-11 rounded-full p-1 bg-slate-200 transition-colors duration-300 ease-in-out appearance-none checked:bg-blue-600 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2" title="Automatically snap the path to roads between points" />
                </div>
                <div class="flex flex-col gap-2">
                    <input type="text" id="section-name-input" placeholder="Enter a name for this path" class="flex-grow p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500">
                    <div class="grid grid-cols-3 gap-2">
                        <button id="undo-button" class="bg-slate-500 hover:bg-slate-600 text-white font-bold p-2 rounded-md transition duration-300" title="Remove the last point added">Undo</button>
                        <button id="clear-drawing-button" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold p-2 rounded-md transition duration-300" title="Clear the current drawing from the map">Clear</button>
                        <button id="save-section-button" class="bg-green-500 hover:bg-green-600 text-white font-bold p-2 rounded-md transition duration-300 col-span-1" title="Save the current path as a reusable section">Save</button>
                    </div>
                    <div id="selection-mode-controls" class="mt-2">
                         <button id="toggle-selection-mode-button" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold p-2 rounded-md transition duration-300">Enter Selection Mode</button>
                         <div id="selection-actions" class="hidden mt-2 grid grid-cols-2 gap-2">
                            <button id="create-section-from-selection-button" class="bg-purple-500 hover:bg-purple-600 text-white font-bold p-2 rounded-md transition duration-300">Create Section</button>
                            <button id="exit-selection-mode-button" class="bg-gray-500 hover:bg-gray-600 text-white font-bold p-2 rounded-md transition duration-300">Exit</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Saved Sections -->
            <div class="bg-white p-4 rounded-lg shadow-lg">
                <h2 class="text-lg font-semibold text-slate-700 panel-heading">2. Manage Sections</h2>
                <div id="sections-list" class="min-h-[120px] max-h-48 overflow-y-auto p-1 mt-2">
                    <p class="text-slate-500 text-center p-4">Your saved sections will appear here. Drag them to the course builder below.</p>
                </div>
            </div>

            <!-- Final Course Builder -->
            <div class="bg-white p-4 rounded-lg shadow-lg flex-grow flex flex-col">
                <div class="panel-heading flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-slate-700">3. Build Your Final Course</h2>
                    <span id="course-distance" class="text-sm font-medium text-slate-500">Total: 0.00 km</span>
                </div>
                <div id="course-sequence-list" class="min-h-[150px] flex-grow bg-slate-50 border-2 border-dashed border-slate-300 rounded-md p-2 mt-2">
                    <p class="text-slate-400 text-center self-center">Drop sections here</p>
                </div>
                <button id="clear-course-button" class="mt-2 w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-md transition duration-300" title="Clear all sections from the final course builder">Clear Course</button>
            </div>
        </div>
    </main>
    
    <!-- Custom Modal -->
    <div id="custom-modal" class="modal-backdrop">
        <div class="modal-content">
            <p id="modal-message" class="text-lg mb-4"></p>
            <button id="modal-close-button" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg">OK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
